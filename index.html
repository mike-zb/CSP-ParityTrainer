<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Parity Trainer</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app" role="application" aria-label="Parity trainer">
    <div class="top">
      <div class="title"><h1>Parity Trainer</h1></div>

      <div class="controlsTop">
        <button class="gearBtn" id="openSettings" type="button" aria-label="Settings">
          <span aria-hidden="true">⚙</span>
          <span class="gearTip">Settings</span>
        </button>
      </div>
    </div>

    <div class="center">
      <div class="box" aria-live="polite">
        <div class="single" id="singleStage">
          <div class="swatch" id="singleSwatch"></div>
        </div>

        <div class="row" id="rowNormal">
          <div class="swatch" id="n0"><div class="strikeOverlay"></div></div>
          <div class="swatch" id="n1"><div class="strikeOverlay"></div></div>
          <div class="swatch" id="n2"><div class="strikeOverlay"></div></div>
        </div>
      </div>

      <div class="answers">
        <button class="btn" id="btnOdd" data-parity="1" disabled>Odd</button>
        <button class="btn" id="btnEven" data-parity="0" disabled>Even</button>
      </div>
    </div>

    <div class="roundTimer" id="roundTimer">0.00s</div>

    <div class="footer">
      <div class="link">
        Created by <a href="https://github.com/mike-zb" target="_blank">MikeZb</a>
      </div>
      <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
        <div class="pill">Score: <b id="score">0</b> / <b id="total">0</b></div>
        <div class="pill">Avg time: <b id="avgTime">0.00</b>s</div>
      </div>
    </div>
  </div>

  <div class="modalBackdrop" id="settingsBackdrop" aria-hidden="true"></div>

  <div class="modal" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" aria-hidden="true">
    <div class="modalCard">
      <div class="modalHeader">
        <div class="modalTitle" id="settingsTitle">Settings</div>
        <button class="iconBtn" id="closeSettings" type="button" aria-label="Close settings">✕</button>
      </div>

      <div class="modalBody">
        <div class="settingRow">
          <div class="settingLabel">Show explanation</div>
          <div class="toggle">
            <div class="switch" id="switch">
              <div class="knob"></div>
              <input id="explainToggle" type="checkbox" />
            </div>
          </div>
        </div>

        <div class="settingRow">

          <div class="settingLabel labelWithInfo">
            <span>Mode</span>
            <button id="modeInfo" class="infoBtn" type="button" aria-label="Mode info">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9"></circle>
                <line x1="12" y1="10" x2="12" y2="16"></line>
                <circle cx="12" cy="7" r="1"></circle>
              </svg>
              <span class="tip" id="modeTip">
                <span style="color:#b7c1ff; font-weight:600;">Auto</span>: Shows each color after a set delay<br>
                <span style="color:#b7c1ff; font-weight:600;">Manual</span>: Advance to the next color manually<br>
                <span style="color:#b7c1ff; font-weight:600;">Inspection</span>: Complete a set of 4 parities back to back (manual)
              </span>
            </button>
          </div>

          <div class="selectWrapper">
            <select id="modeSelect" class="modeSelect">
              <option value="AUTO">Auto</option>
              <option value="MANU">Manual</option>
              <option value="INSP">Inspection</option>
            </select>
          </div>
        </div>

        <div class="settingRow" id="delayRow">
          <div class="settingLabel">Delay</div>
          <div class="delayWrap">
            <input id="msRange" type="range" min="150" max="1200" step="50" value="500" />
            <span class="ms"><span id="msVal">500</span> ms</span>
          </div>
        </div>

        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
          <button class="resetBtn" id="resetScores" type="button">Reset scores</button>
        </div>
        <div class="hint">
          Manual mode: Space / ← / → advance colors. On 3rd color, next ←/→ answers. Tap anywhere on mobile to advance.
        </div>

        <div class="help" aria-label="Controls help">
          Controls:
          <span class="kbd">Space</span>New round
          <span class="kbd">←</span>Odd
          <span class="kbd">→</span>Even
        </div>

      </div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
